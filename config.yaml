# ============================================================
# 输入/输出配置文件
# 说明：将数据源和输出目标分离配置，
#       后续可方便地将 excel/csv 切换为 mysql 等其他数据源
# ============================================================

# ---- 数据源配置（输入） ----
input:
  # 数据源类型：excel / csv / mysql
  type: csv

  # CSV 配置（当 input.type == csv 时生效）
  csv:
    file_path: "findings.csv"
    encoding: "gb18030"
    flag_filter_value: 0
    fields: ["id", "url", "flag", "content_all"]

  # Excel 配置（当 input.type == excel 时生效）
  excel:
    file_path: "DeepResearch.xlsx"
    sheet_name: 0
    flag_filter_value: 0
    fields: ["id", "url", "flag", "content_all"]

  # MySQL 配置（当 input.type == mysql 时生效，后续切换使用）
  mysql:
    host: "127.0.0.1"
    port: 3306
    user: "root"
    password: "your_password"
    database: "deep_research"
    table: "articles"
    query: "SELECT id, url FROM articles WHERE flag = 0"

# ---- 输出配置 ----
output:
  # 输出类型：excel / csv / mysql
  type: csv

  # CSV 输出配置（当 output.type == csv 时生效）
  csv:
    file_path: "findings_output.csv"
    encoding: "gb18030"

  # Excel 输出配置（当 output.type == excel 时生效）
  excel:
    file_path: "DeepResearch_output.xlsx"
    update_fields: ["content_all", "flag"]

  # MySQL 输出配置（当 output.type == mysql 时生效，后续切换使用）
  mysql:
    host: "127.0.0.1"
    port: 3306
    user: "root"
    password: "your_password"
    database: "deep_research"
    table: "articles"
    update_sql: "UPDATE articles SET content_all = :content_all, flag = :flag WHERE id = :id"

# ---- 抓取配置 ----
crawler:
  timeout: 15
  delay: 1
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  max_retries: 3
  browser_timeout: 20
  browser_domains: []
  ad_keywords:
    - "ad-"
    - "advertisement"
    - "adsbygoogle"
    - "banner-ad"
    - "sidebar-ad"
    - "promo"
    - "sponsored"
    - "guanggao"
    - "gg_"
    - "tonglan"
    - "duilian"
